<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Trips</title>
</head>
<body>

<th:block th:replace="~{fragments/headerFragments :: header}"></th:block>

<h2>My Trips</h2>

<a href="/addTrip">+ Add New Trip</a>
<a href="/driver/home">← Back to Home</a>

<div th:if="${trips == null or trips.isEmpty()}">
    <p>You have no trips yet.</p>
</div>

<table th:if="${trips != null and !trips.isEmpty()}" border="1" cellpadding="8" cellspacing="0">
    <thead>
    <tr>
        <th>#</th>
        <th>From</th>
        <th>To</th>
        <th>Departure</th>
        <th>Seats</th>
        <th>Available</th>
        <th>Price</th>
        <th>Status</th>
        <th>Smoking</th>
        <th>Pets</th>
        <th>Baggage</th>
        <th>Eating</th>
        <th>Rules</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="trip : ${trips}">
        <td th:text="${trip.id}"></td>
        <td th:text="${trip.fromCity}"></td>
        <td th:text="${trip.toCity}"></td>
        <td th:text="${#temporals.format(trip.departureTime, 'dd.MM.yyyy HH:mm')}"></td>
        <td th:text="${trip.totalSeats}"></td>
        <td th:text="${trip.availableSeats}"></td>
        <td th:text="${trip.pricePerSeat}"></td>
        <td th:text="${trip.status}"></td>
        <td th:text="${trip.smokingAllowed ? 'Yes' : 'No'}"></td>
        <td th:text="${trip.petsAllowed ? 'Yes' : 'No'}"></td>
        <td th:text="${trip.baggageAllowed ? 'Yes' : 'No'}"></td>
        <td th:text="${trip.eatAllowed ? 'Yes' : 'No'}"></td>
        <td th:text="${trip.rules}"></td>
    </tr>
    </tbody>
</table>

</body>
</html>
