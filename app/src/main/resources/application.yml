spring:
  liquibase:
    enabled: true
    change-log: classpath:/db/changelog-master.xml
  application:
    name: smart-route-prod
  datasource:
    url: jdbc:mysql://localhost:3306/smartroute_db?createDatabaseIfNotExist=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:adminroot}
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: none

  servlet:
    multipart:
      max-file-size: 10MB
  profiles:
    active:
